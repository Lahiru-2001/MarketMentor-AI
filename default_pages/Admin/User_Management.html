  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const token = localStorage.getItem("access_token");

    if (!token) {
      alert("Unauthorized. Please login as Admin.");
      window.location.href = "/";
    }

    async function loadUsers() {
      try {
        const response = await fetch(`${API_BASE}/admin/users`, {
          headers: { "Authorization": `Bearer ${token}` }
        });

        if (!response.ok) throw new Error("Not authorized");

        const users = await response.json();
        const tableBody = document.getElementById("userTableBody");
        const noUsersMessage = document.getElementById("noUsersMessage");
        tableBody.innerHTML = "";

        if (users.length === 0) {
          noUsersMessage.style.display = "block";
          return;
        } else {
          noUsersMessage.style.display = "none";
        }

        users.forEach(user => {
          const row = `
            <tr>
              <td>${user.user_id}</td>
              <td>${user.username}</td>
              <td>${user.first_name ?? "-"}</td>
              <td>${user.last_name ?? "-"}</td>
              <td>${user.email}</td>
              <td>${user.phone_number ?? "-"}</td>
              <td>${user.country ?? "-"}</td>
              <td>${user.investment_objective ?? "-"}</td>
              <td class="text-center">
                <button 
                  class="btn btn-sm ${user.status === "Active" ? "btn-success" : "btn-danger"}"
                  onclick="toggleStatus(${user.user_id}, '${user.status}')"
                  ${user.status === "Inactive" ? "disabled" : ""}
                >
                  ${user.status}
                </button>
              </td>
            </tr>
          `;
          tableBody.innerHTML += row;
        });

      } catch (error) {
        alert("Access denied.");
        console.error(error);
      }
    }

    async function toggleStatus(userId, currentStatus) {
      if (currentStatus === "Inactive") return;
      if (!confirm("Are you sure you want to deactivate this user?")) return;

      try {
        const response = await fetch(`${API_BASE}/admin/deactivate/${userId}`, {
          method: "PUT",
          headers: { "Authorization": `Bearer ${token}` }
        });
        const data = await response.json();
        alert(data.message);
        loadUsers();
      } catch (error) {
        alert("Failed to deactivate user");
      }
    }

    window.onload = loadUsers;
  </script>
