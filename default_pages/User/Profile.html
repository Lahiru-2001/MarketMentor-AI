<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MarketMentor-AI — Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="stylesheet" href="../../assets/CSS/User_Dashbord.css">
</head>

<body>

  <div class="app">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <div class="logo">M-AI</div>
        <div class="brand-text">
          <div style="letter-spacing:0.2px;color:var(--accent);font-weight:700;">MarketMentor-AI</div>
          <div style="font-size:11px; color:var(--text-muted); font-weight:600;">AI Conversations</div>
        </div>
      </div>

      <nav class="nav-list">
        <a class="nav-item" href="Recommendation.html">
          <div class="icon"><i class="fa-solid fa-hand-holding-dollar" style="color: rgb(255, 212, 59);"></i></div>
          <div class="label">Investment Recommendation</div>
        </a>

        <a class="nav-item" href="Recommendation_History.html">
          <div class="icon"><i class="fa-solid fa-clock-rotate-left" style="color: rgb(255, 212, 59);"></i></div>
          <div class="label">Recommendation History</div>
        </a>
      </nav>

      <!-- Profile & dropdown -->
      <div class="sidebar-footer">
        <div class="profile" id="profileBtn">
          <img class="avatar" src="../../assets/images/default_avatar.png.png" alt="User avatar" />
          <div class="meta">
            <div class="name">Lahiru Kasun</div>
          </div>
          <div style="margin-left: auto; color: var(--text-muted)">▾</div>
        </div>
        <div id="profileDropdown" class="profile-dropdown">
          <a href="Profile.html">Profile & Preferences</a>
          <a href="Support.html">Support</a>
          <a href="http://127.0.0.1:8000/">Logout</a>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">
      <!-- PROFILE DETAILS CARD -->
      <div class="profile-section card-glass">
        <h4>Personal Information</h4>

        <div class="profile-top">
          <div class="upload-wrapper">
            <label for="profileUpload" class="upload-label">
              <img id="profilePreview" class="upload-preview" src="../../assets/images/default_avatar.png.png"
                alt="Profile Preview">
              <div class="upload-overlay">
                <i class="fa-solid fa-camera"></i>
              </div>
            </label>
            <input type="file" id="profileUpload" accept="image/*" hidden>
          </div>
          <div class="form-group">
            <label><strong>Username</strong></label>
            <input id="usernameInput" type="text" disabled>
          </div>
        </div>
        <br>
        <div class="profile-grid">

          <div class="form-group">
            <label><strong>First Name</strong></label>
            <input id="firstNameInput" type="text" disabled>
          </div>

          <div class="form-group">
            <label><strong>Last Name</strong></label>
            <input id="lastNameInput" type="text" disabled>
          </div>

          <div class="form-group">
            <label><strong>Email Address</strong></label>
            <input id="emailInput" type="email" disabled>
          </div>

          <div class="form-group">
            <label><strong>Phone Number</strong></label>
            <input id="phoneInput" type="text" disabled>
          </div>

          <div class="form-group">
            <label><strong>Country</strong></label>
            <input id="countryInput" type="text" disabled>
          </div>

          <div class="form-group full-width">
            <label><strong>Investment Objective</strong></label>
            <textarea id="objectiveInput" rows="3" disabled></textarea>
          </div>

        </div>

        <div class="button-group">
          <button id="updateBtn" class="update-btn">Update Profile</button>
          <button id="saveBtn" class="save-btn" style="display:none;">Save Profile</button>
        </div>
      </div>

    </main>
  </div>

  <!-- JS -->
  <script>
    const profileBtn = document.getElementById('profileBtn');
    const profileDropdown = document.getElementById('profileDropdown');
    const updateBtn = document.getElementById("updateBtn");
    const saveBtn = document.getElementById("saveBtn");

    const usernameInput = document.getElementById("usernameInput");
    const emailInput = document.getElementById("emailInput");
    const firstNameInput = document.getElementById("firstNameInput");
    const lastNameInput = document.getElementById("lastNameInput");
    const phoneInput = document.getElementById("phoneInput");
    const countryInput = document.getElementById("countryInput");
    const objectiveInput = document.getElementById("objectiveInput");
    const profileUpload = document.getElementById("profileUpload");
    const profilePreview = document.getElementById("profilePreview");

    const token = localStorage.getItem("access_token");

    if (!token) {
      alert("Session expired. Please login again.");
      window.location.href = "../../index.html";
    }

    const profileFields = [
      usernameInput,
      emailInput,
      firstNameInput,
      lastNameInput,
      phoneInput,
      countryInput,
      objectiveInput
    ];

    // LOAD PROFILE
    async function loadProfile() {
      try {
        const response = await fetch("http://localhost:8000/profile/", {
          method: "GET",
          headers: { "Authorization": "Bearer " + token }
        });

        if (!response.ok) throw new Error("Failed to load profile");

        const data = await response.json();

        usernameInput.value = data.username || "";
        emailInput.value = data.email || "";
        firstNameInput.value = data.first_name || "";
        lastNameInput.value = data.last_name || "";
        phoneInput.value = data.phone_number || "";
        countryInput.value = data.country || "";
        objectiveInput.value = data.investment_objective || "";

        if (data.profile_image) profilePreview.src = data.profile_image;

      } catch (error) {
        console.error("Profile load error:", error);
      }
    }

    loadProfile();

    // IMAGE PREVIEW
    profileUpload.addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;

      const allowedTypes = ["image/jpeg", "image/png", "image/jpg"];
      const maxSize = 2 * 1024 * 1024;

      if (!allowedTypes.includes(file.type)) {
        alert("Only JPG, JPEG, PNG images are allowed.");
        this.value = "";
        return;
      }

      if (file.size > maxSize) {
        alert("Image must be less than 2MB.");
        this.value = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = function (e) {
        profilePreview.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    // ENABLE EDIT MODE
    updateBtn.addEventListener("click", () => {
      profileFields.forEach(field => field.disabled = false);
      updateBtn.style.display = "none";
      saveBtn.style.display = "inline-block";
    });

    // VALIDATE ALL FIELDS
    function validateFields() {
      const username = usernameInput.value.trim();
      const email = emailInput.value.trim();
      const firstName = firstNameInput.value.trim();
      const lastName = lastNameInput.value.trim();
      const phone = phoneInput.value.trim();
      const country = countryInput.value.trim();
      const objective = objectiveInput.value.trim();

      // CHECK EMPTY FIELDS
      if (!username || !email || !firstName || !lastName || !phone || !country || !objective) {
        alert("Fields are empty");
        return false;
      }

      const usernameRegex = /^[a-zA-Z0-9_]{4,20}$/;
      const nameRegex = /^[A-Za-z ]{2,30}$/;
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneRegex = /^[0-9]{7,15}$/;
      const countryRegex = /^[A-Za-z ]{2,50}$/;

      if (!usernameRegex.test(username)) {
        alert("Username must be 4-20 characters and contain only letters, numbers, or underscore.");
        return false;
      }
      if (!emailRegex.test(email)) {
        alert("Please enter a valid email address.");
        return false;
      }
      if (!nameRegex.test(firstName)) {
        alert("First name must contain only letters.");
        return false;
      }
      if (!nameRegex.test(lastName)) {
        alert("Last name must contain only letters.");
        return false;
      }
      if (!phoneRegex.test(phone)) {
        alert("Phone number must contain only digits (7–15 numbers).");
        return false;
      }
      if (!countryRegex.test(country)) {
        alert("Country must contain only letters.");
        return false;
      }
      if (objective.length > 300) {
        alert("Investment objective cannot exceed 300 characters.");
        return false;
      }

      return true;
    }

    // SAVE PROFILE
    saveBtn.addEventListener("click", async () => {
      if (!validateFields()) return;

      const data = {
        username: usernameInput.value.trim(),
        email: emailInput.value.trim(),
        first_name: firstNameInput.value.trim(),
        last_name: lastNameInput.value.trim(),
        phone_number: phoneInput.value.trim(),
        country: countryInput.value.trim(),
        investment_objective: objectiveInput.value.trim(),
        profile_image: profilePreview.src || null
      };

      try {
        const response = await fetch("http://localhost:8000/profile/update", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();
        if (!response.ok) {
          alert(result.detail || "Update failed");
          return;
        }

        alert(result.message);
        profileFields.forEach(field => field.disabled = true);
        saveBtn.style.display = "none";
        updateBtn.style.display = "inline-block";

      } catch (error) {
        console.error("Update error:", error);
        alert("Server error. Please try again.");
      }
    });

    // PROFILE DROPDOWN
    profileBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      profileDropdown.classList.toggle("show");
    });

    document.addEventListener("click", (e) => {
      if (!profileBtn.contains(e.target)) profileDropdown.classList.remove("show");
    });
  </script>

</body>
</html>
