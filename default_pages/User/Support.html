<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MarketMentor-AI — Support</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="stylesheet" href="../../assets/CSS/User_Dashbord.css">
</head>

<body>

  <div class="app">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <div class="logo">M-AI</div>
        <div class="brand-text">
          <div style="letter-spacing:0.2px;color:var(--accent);font-weight:700;">MarketMentor-AI</div>
          <div style="font-size:11px; color:var(--text-muted); font-weight:600;">AI Conversations</div>
        </div>
      </div>

      <nav class="nav-list">
        <a class="nav-item" href="Recommendation.html">
          <div class="icon"><i class="fa-solid fa-hand-holding-dollar" style="color: rgb(255, 212, 59);"></i></div>
          <div class="label">Investment Recommendation</div>
        </a>
        <a class="nav-item" href="Recommendation_History.html">
          <div class="icon"><i class="fa-solid fa-clock-rotate-left" style="color: rgb(255, 212, 59);"></i></div>
          <div class="label">Recommendation History</div>
        </a>
      </nav>

      <!-- Profile & dropdown -->
      <div class="sidebar-footer">
        <div class="profile" id="profileBtn">
          <img class="avatar" src="../../assets/images/default_avatar.png.png" alt="User avatar" />
          <div class="meta">
            <div class="name">Lahiru Kasun</div>
          </div>
          <div style="margin-left: auto; color: var(--text-muted)">▾</div>
        </div>
        <div id="profileDropdown" class="profile-dropdown">
          <a href="Profile.html">Profile & Preferences</a>
          <a href="Support.html">Support</a>
          <a href="http://127.0.0.1:8000/">Logout</a>
        </div>
      </div>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

      <!-- SUPPORT CARD -->
      <div class="support-card card-glass">
        <h4>Contact Support</h4>
        <p class="support-info">Tell us your issue and our support team will assist you as soon as possible.</p>

        <div class="support-grid">

          <div class="form-group">
            <label>Your Name</label>
            <input id="supportName" type="text" placeholder="Enter your name">
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input id="supportEmail" type="email" placeholder="Enter your email">
          </div>

          <div class="form-group full">
            <label>Select Issue Type</label>
            <select id="supportIssue">
              <option value="">-- Select issue --</option>
              <option>Login Issue</option>
              <option>Dashboard Error</option>
              <option>Recommendation Not Loading</option>
              <option>Watchlist Issue</option>
              <option>Payment or Billing</option>
              <option>Other</option>
            </select>
          </div>

          <div class="form-group full">
            <label>Description</label>
            <textarea id="supportMessage" rows="4" placeholder="Describe your issue..."></textarea>
          </div>

        </div>

        <button class="send-btn" onclick="sendSupport()">Send Message</button>
      </div>

      <!-- USER + ADMIN MESSAGE THREAD SECTION -->
      <div class="support-thread-container">
        <h2>User Support Messages</h2>
        <div id="supportThreads"></div>
      </div>

    </main>

  </div>

  <script>
    const profileBtn = document.getElementById('profileBtn');
    const profileDropdown = document.getElementById('profileDropdown');

    // Profile dropdown
    profileBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      profileDropdown.classList.toggle("show");
      profileBtn.setAttribute(
        "aria-expanded",
        profileDropdown.classList.contains("show"),
      );
    });
    document.addEventListener("click", (e) => {
      if (!profileBtn.contains(e.target)) {
        profileDropdown.classList.remove("show");
        profileBtn.setAttribute("aria-expanded", "false");
      }
    });

    // ===============================
    // SEND SUPPORT MESSAGE WITH EMPTY CHECK
    // ===============================
    async function sendSupport() {
      const token = localStorage.getItem("access_token");
      if (!token) {
        alert("Please login first.");
        return;
      }

      const name = document.getElementById("supportName").value.trim();
      const email = document.getElementById("supportEmail").value.trim();
      const issue = document.getElementById("supportIssue").value.trim();
      const message = document.getElementById("supportMessage").value.trim();

      // ✅ EMPTY FIELD CHECK
      if (!name || !email || !issue || !message) {
        alert("Fields are empty");
        return;
      }

      const data = { username: name, email: email, issue_type: issue, description: message };

      try {
        const response = await fetch("http://localhost:8000/support/send", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
          alert("Message sent successfully!");
          loadSupportMessages(); // refresh messages
          // clear form
          document.getElementById("supportName").value = "";
          document.getElementById("supportEmail").value = "";
          document.getElementById("supportIssue").value = "";
          document.getElementById("supportMessage").value = "";
        } else {
          alert(result.detail || "Error sending message");
        }
      } catch (error) {
        console.error(error);
        alert("Server error. Please try again.");
      }
    }

    // ===============================
    // LOAD USER SUPPORT MESSAGES
    // ===============================
    async function loadSupportMessages() {
      const token = localStorage.getItem("access_token");
      if (!token) return;

      try {
        const response = await fetch("http://localhost:8000/support/my-messages", {
          method: "GET",
          headers: { "Authorization": "Bearer " + token }
        });

        const data = await response.json();
        const container = document.getElementById("supportThreads");
        container.innerHTML = "";

        if (!response.ok) {
          container.innerHTML = "<p>Error loading messages</p>";
          return;
        }

        if (data.length === 0) {
          container.innerHTML = "<p>No support messages found.</p>";
          return;
        }

        data.forEach(message => {
          const statusClass = message.status === "Resolved"
            ? "status-badge status-resolved"
            : "status-badge status-open";

          let threadHTML = `
            <div class="support-thread">
              <div class="user-message">
                <h5 class="msg-title">${message.issue_type}</h5>
                <p class="msg-text">${message.description}</p>
                <p class="${statusClass}">${message.status}</p>
                <p class="msg-time">Created at: ${new Date(message.created_at).toLocaleString()}</p>
              </div>`;

          if (message.replies.length > 0) {
            threadHTML += `<div class="admin-replies">`;
            message.replies.forEach(reply => {
              threadHTML += `
                <div class="admin-reply">
                  <p class="reply-message">${reply.reply_message}</p>
                  <p class="reply-time">${reply.admin_name} – ${new Date(reply.created_at).toLocaleString()}</p>
                </div>`;
            });
            threadHTML += `</div>`;
          }

          threadHTML += `</div>`;
          container.innerHTML += threadHTML;
        });

      } catch (error) {
        console.error(error);
        document.getElementById("supportThreads").innerHTML = "<p>Error loading messages</p>";
      }
    }

    window.onload = function () {
      loadSupportMessages();
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
